<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>White Card Course SOP Guide</title>
  <style>
    :root {
      --bg: #f3f4f6;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #667085;
      --line: #d7dce3;
      --dark: #111827;
      --dark-2: #1f2937;
      --sidebar: #111827;
      --sidebar-soft: #1f2937;
      --sidebar-w: 310px;
      --blue: #2563eb;
      --purple: #7c3aed;
      --cyan: #0891b2;
      --green: #16a34a;
      --light: #f8fafc;
      --soft: #eef2f7;
      --radius: 18px;
      --shadow: 0 14px 34px rgba(16, 24, 40, 0.10);
      --shadow-soft: 0 8px 18px rgba(16, 24, 40, 0.07);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
      font-size: 15px;
    }
    a { color: inherit; }
    button, input, select { font: inherit; }

    .app-shell {
      min-height: 100vh;
      display: block;
    }

    .sidebar {
      position: fixed;
      inset: 0 auto 0 0;
      width: var(--sidebar-w);
      height: 100vh;
      background: var(--sidebar);
      color: #ffffff;
      display: flex;
      flex-direction: column;
      border-right: 1px solid rgba(255,255,255,0.10);
      z-index: 40;
    }
    .sidebar-brand {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 28px 20px 22px;
    }
    .brand-mark {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: #ffffff;
      color: #111827;
      font-weight: 800;
      font-size: 19px;
      letter-spacing: -0.05em;
      flex: 0 0 auto;
    }
    .sidebar-brand h1 {
      margin: 0;
      font-size: 22px;
      letter-spacing: -0.03em;
      line-height: 1.1;
    }
    .sidebar-brand p { margin: 5px 0 0; color: #aab4c5; font-size: 13px; }
    .sidebar-scroll { padding: 0 20px 20px; overflow-y: auto; }
    .side-section { margin: 22px 0; }
    .side-title {
      margin: 0 0 10px 10px;
      color: #8fa1bd;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 12px;
    }
    .side-nav { display: grid; gap: 8px; }
    .nav-button, .small-button, .doc-button {
      border: 1px solid var(--line);
      background: var(--card);
      color: var(--text);
      border-radius: 999px;
      padding: 9px 13px;
      cursor: pointer;
      transition: transform 0.15s ease, border 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }
    .nav-button:hover, .small-button:hover, .doc-button:hover { transform: translateY(-1px); border-color: #9aa4b2; }
    .nav-button.active { background: var(--dark); color: white; border-color: var(--dark); }
    .sidebar .nav-button {
      justify-content: flex-start;
      width: 100%;
      background: transparent;
      border-color: transparent;
      color: #edf2ff;
      border-radius: 22px;
      padding: 12px 14px;
      font-weight: 600;
    }
    .sidebar .nav-button:hover { background: rgba(255,255,255,0.08); transform: none; }
    .sidebar .nav-button.active { background: #2947c6; border-color: #2947c6; color: #ffffff; }
    .nav-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex: 0 0 auto;
      background: #60a5fa;
    }
    .dot-home { background: #60a5fa; }
    .dot-enrolment { background: #a78bfa; }
    .dot-processing { background: #2dd4bf; }
    .dot-submission { background: #4ade80; }
    .dot-documents { background: #93c5fd; }
    .quick-link {
      border: 0;
      background: transparent;
      color: #e5edff;
      text-align: left;
      border-radius: 14px;
      padding: 9px 10px;
      cursor: pointer;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .quick-link:hover { background: rgba(255,255,255,0.08); }
    .sidebar-footer {
      margin-top: auto;
      border-top: 1px solid rgba(255,255,255,0.10);
      padding: 20px;
      color: #dbe4f5;
      font-size: 13px;
    }
    .sidebar-footer strong { display: block; color: #ffffff; margin-bottom: 3px; }

    .main-shell {
      min-width: 0;
      min-height: 100vh;
      margin-left: var(--sidebar-w);
    }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      background: rgba(248, 250, 252, 0.96);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line);
    }
    .topbar-inner {
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }
    .mobile-menu { display: none; }
    .top-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .small-button.dark { background: var(--dark); color: white; border-color: var(--dark); }
    .small-button.flat { background: transparent; }

    .search-area { position: relative; flex: 1 1 360px; max-width: 520px; }
    .search-box {
      display: flex;
      align-items: center;
      gap: 8px;
      background: white;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 8px 10px;
      box-shadow: var(--shadow-soft);
    }
    .search-box input {
      border: none;
      outline: none;
      width: 100%;
      min-width: 120px;
      background: transparent;
      color: var(--text);
    }
    .search-box .symbol { color: var(--muted); font-size: 13px; }
    .search-results {
      display: none;
      position: absolute;
      left: 0;
      top: calc(100% + 8px);
      width: min(680px, calc(100vw - 360px));
      max-height: 70vh;
      overflow: auto;
      background: white;
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 10px;
      z-index: 50;
    }
    .search-results.open { display: block; }
    .search-result {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      margin: 8px 0;
      background: var(--light);
    }
    .search-result strong { display: block; margin-bottom: 4px; }
    .search-result .meta { color: var(--muted); font-size: 12px; margin-bottom: 6px; }
    .search-result p { margin: 0 0 10px; color: #404853; font-size: 13px; }
    mark { background: #eceff3; padding: 0 2px; border-radius: 3px; }

    .container { max-width: 1040px; margin: 0 auto; padding: 26px 30px 56px; }
    .page { display: none; animation: fade 0.18s ease; }
    .page.active { display: block; }
    @keyframes fade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

    .notice {
      background: #edf0f4;
      border: 1px solid #cfd6df;
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 18px;
      color: #2f3640;
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .notice strong { display: block; margin-bottom: 2px; }
    .hero, .phase-header {
      background: white;
      border-radius: 26px;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      padding: 28px;
      margin-bottom: 22px;
    }
    .hero h2, .phase-header h2 { margin: 0 0 8px; font-size: clamp(30px, 5vw, 44px); letter-spacing: -0.05em; line-height: 1.05; }
    .hero p, .phase-header p { color: var(--muted); max-width: 850px; margin: 0; font-size: 17px; }
    .quick-actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 22px; }

    .home-meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 28px;
    }
    .meta-card {
      background: var(--light);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
    }
    .meta-card span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
      font-weight: 700;
    }
    .meta-card strong { font-size: 16px; }

    .section-title {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 14px;
      margin: 24px 0 12px;
    }
    .section-title h3 { margin: 0; font-size: 26px; letter-spacing: -0.03em; }
    .section-title p { margin: 4px 0 0; color: var(--muted); font-size: 16px; }

    .home-phase-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
      margin: 18px 0 24px;
    }
    .home-phase-card {
      background: white;
      border: 1px solid var(--line);
      border-top: 5px solid var(--blue);
      border-radius: 18px;
      padding: 28px 20px 20px;
      min-height: 285px;
      box-shadow: var(--shadow-soft);
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .home-phase-card:hover { transform: translateY(-3px); box-shadow: var(--shadow); border-color: #aab4c5; }
    .home-phase-card.phase-enrolment { border-top-color: var(--purple); }
    .home-phase-card.phase-processing { border-top-color: var(--cyan); }
    .home-phase-card.phase-submission { border-top-color: var(--green); }
    .phase-number {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      font-weight: 800;
      font-size: 18px;
      background: #e9ddff;
      color: #6d28d9;
    }
    .phase-processing .phase-number { background: #d9f3f8; color: #0e7490; }
    .phase-submission .phase-number { background: #dcfce7; color: #15803d; }
    .home-phase-card h3 { margin: 0; font-size: 25px; letter-spacing: -0.03em; }
    .home-phase-card p { margin: 0; color: #536179; }
    .card-line { height: 1px; background: var(--line); margin-top: auto; }
    .phase-output { font-size: 14px; }

    .roadmap {
      display: grid;
      grid-template-columns: 1fr auto 1fr auto 1fr;
      gap: 12px;
      align-items: stretch;
      margin: 20px 0;
    }
    .roadmap-card {
      background: white;
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 18px;
      box-shadow: var(--shadow-soft);
      cursor: pointer;
      min-height: 180px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: transform 0.15s ease, border 0.15s ease, box-shadow 0.15s ease;
    }
    .roadmap-card:hover { transform: translateY(-2px); border-color: #9aa1ab; box-shadow: var(--shadow); }
    .phase-tag { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 700; }
    .roadmap-card h3 { margin: 0; font-size: 24px; letter-spacing: -0.03em; }
    .roadmap-card p { margin: 0; color: #454d57; }
    .owner-pill, .tag-pill {
      display: inline-flex;
      width: fit-content;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 9px;
      color: #404853;
      background: var(--light);
      font-size: 12px;
    }
    .road-arrow { display: grid; place-items: center; color: var(--muted); font-size: 28px; }

    .mini-flow {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 4px 2px 12px;
      margin-bottom: 14px;
    }
    .mini-node {
      min-width: 165px;
      border: 1px solid var(--line);
      background: white;
      border-radius: 16px;
      padding: 12px;
      box-shadow: var(--shadow-soft);
      cursor: pointer;
    }
    .mini-node:hover { border-color: #9aa1ab; }
    .mini-node small { color: var(--muted); display: block; margin-bottom: 4px; }
    .mini-node span { font-weight: 700; display: block; line-height: 1.25; }

    .grid { display: grid; gap: 14px; }
    .grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid.three { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .card {
      background: white;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow-soft);
      padding: 18px;
    }
    .card h3, .card h4 { margin: 0 0 10px; letter-spacing: -0.02em; }
    .card p { margin: 0; color: #454d57; }
    .card ul { margin-top: 8px; }
    .info-list { margin: 10px 0 0; padding: 0; list-style: none; display: grid; gap: 8px; }
    .info-list li { display: grid; grid-template-columns: 160px 1fr; gap: 12px; border-top: 1px solid var(--line); padding-top: 8px; }
    .info-list strong { color: #2f3640; }

    .phase-meta { display: flex; flex-wrap: wrap; gap: 8px; margin: 14px 0 0; }
    .tools-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; justify-content: space-between; margin: 16px 0; }
    .filter-box { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; color: var(--muted); }
    .filter-box select {
      background: white;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 12px;
      min-width: 210px;
    }

    .step-card {
      background: white;
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow-soft);
      padding: 18px;
      margin-bottom: 14px;
      scroll-margin-top: 100px;
    }
    .step-card.hidden-by-filter { display: none; }
    .step-head {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 14px;
      align-items: start;
      margin-bottom: 14px;
    }
    .step-num {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--dark);
      color: white;
      display: grid;
      place-items: center;
      font-weight: 700;
    }
    .step-head h3 { margin: 0 0 6px; font-size: 21px; letter-spacing: -0.02em; }
    .step-meta { display: flex; flex-wrap: wrap; gap: 8px; color: var(--muted); }
    .step-body { display: grid; grid-template-columns: 1.4fr 1fr; gap: 16px; }
    .step-body h4 { margin: 0 0 8px; font-size: 14px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); }
    .step-body ul { margin: 0; padding-left: 18px; }
    .step-body li { margin-bottom: 6px; }
    .doc-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }

    .checklist-card { scroll-margin-top: 100px; }
    .checklist { margin: 8px 0 0; padding: 0; list-style: none; display: grid; gap: 8px; }
    .checklist li {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      background: var(--light);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
    }
    .checklist input { width: 18px; height: 18px; margin-top: 2px; accent-color: #2f3640; }
    .checklist label { cursor: pointer; }
    .checklist input:checked + label { color: var(--muted); text-decoration: line-through; }

    .doc-group { margin-bottom: 18px; scroll-margin-top: 100px; }
    .doc-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .doc-card {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: white;
      padding: 16px;
      box-shadow: var(--shadow-soft);
    }
    .doc-card h4 { margin: 0 0 6px; }
    .doc-card p { margin: 0 0 12px; color: var(--muted); }
    .doc-button { padding: 8px 11px; }
    .doc-button.placeholder { color: var(--muted); background: var(--light); }

    .empty-state { padding: 18px; color: var(--muted); text-align: center; }
    .footer-note { margin-top: 26px; color: var(--muted); font-size: 12px; text-align: center; }

    @media (max-width: 820px) {
      .app-shell { display: block; }
      .sidebar {
        position: relative;
        inset: auto;
        width: 100%;
        height: auto;
      }
      .main-shell { margin-left: 0; }
      .sidebar-scroll { overflow: visible; }
      .side-nav { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .sidebar-footer { display: none; }
      .topbar { top: 0; }
      .search-results { width: min(680px, 92vw); }
      .container { padding: 22px 18px 48px; }
      .home-phase-grid, .grid.three { grid-template-columns: 1fr; }
      .roadmap { grid-template-columns: 1fr; }
      .road-arrow { transform: rotate(90deg); }
    }

    @media (max-width: 700px) {
      .topbar-inner { flex-wrap: wrap; align-items: stretch; }
      .search-area { flex-basis: 100%; max-width: none; order: 2; }
      .top-actions { width: 100%; justify-content: flex-start; order: 3; }
      .home-meta, .grid.two, .step-body, .doc-grid { grid-template-columns: 1fr; }
      .info-list li { grid-template-columns: 1fr; gap: 4px; }
      .side-nav { grid-template-columns: 1fr; }
      .hero, .phase-header { padding: 22px; }
      .home-phase-card { min-height: auto; }
    }

    @media print {
      body { background: white; font-size: 12px; }
      .sidebar, .topbar, .quick-actions, .tools-row, .search-results, .small-button, .nav-button { display: none !important; }
      .app-shell { display: block; }
      .main-shell { margin-left: 0; }
      .container { max-width: none; padding: 0; }
      .page { display: block !important; break-after: page; }
      .card, .hero, .phase-header, .step-card, .doc-card, .notice { box-shadow: none; border-color: #bbb; }
      .roadmap, .home-phase-grid { grid-template-columns: 1fr; }
      .road-arrow { display: none; }
      .step-body { grid-template-columns: 1fr; }
      a { text-decoration: none; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" aria-label="SOP sidebar">
      <div class="sidebar-brand">
        <div class="brand-mark">WC</div>
        <div>
          <h1 id="appTitle">White Card SOP</h1>
          <p id="appSubtitle">Live roadmap - Internal use</p>
        </div>
      </div>

      <div class="sidebar-scroll">
        <section class="side-section">
          <p class="side-title">Pages</p>
          <nav class="side-nav" id="sideNav" aria-label="Page navigation"></nav>
        </section>

        <section class="side-section">
          <p class="side-title">Quick reference</p>
          <nav class="side-nav compact" aria-label="Quick reference navigation">
            <button type="button" class="quick-link" data-go="documents" data-anchor="common-escalations"><span class="nav-dot dot-enrolment"></span> Common escalation triggers</button>
            <button type="button" class="quick-link" data-go="enrolment" data-anchor="enrolment-exit"><span class="nav-dot dot-processing"></span> Handoffs & Folder Rules</button>
            <button type="button" class="quick-link" data-go="documents"><span class="nav-dot dot-documents"></span> Documents & Templates</button>
            <button type="button" class="quick-link" data-focus-search="true"><span class="nav-dot dot-home"></span> Search SOP</button>
          </nav>
        </section>
      </div>

      <div class="sidebar-footer">
        <strong>Confidential - Internal Use</strong>
        Do not upload student personal information or ID documents to this prototype.
      </div>
    </aside>

    <div class="main-shell">
      <header class="topbar">
        <div class="topbar-inner">
          <div class="search-area">
            <div class="search-box" role="search">
              <span class="symbol">⌕</span>
              <input id="globalSearch" type="search" placeholder="Search SOP... try USI, SafeWork, T-24h, payment" autocomplete="off" />
              <button class="small-button flat" type="button" id="clearSearch" aria-label="Clear search">Clear</button>
            </div>
            <div class="search-results" id="searchResults" aria-live="polite"></div>
          </div>

          <div class="top-actions">
            <button type="button" class="nav-button" data-go="home" data-page-button="home">Main</button>
            <button type="button" class="small-button" data-reset-checklists="all">↻ Reset checklist</button>
            <button type="button" class="small-button dark" id="printBtn">⎙ Print</button>
          </div>
        </div>
      </header>

      <main class="container">
        <section id="page-home" class="page active"></section>
        <section id="page-enrolment" class="page"></section>
        <section id="page-processing" class="page"></section>
        <section id="page-submission" class="page"></section>
        <section id="page-documents" class="page"></section>
        <div class="footer-note" id="footerNote"></div>
      </main>
    </div>
  </div>

  <script>
    // SOP content is stored here so future edits can be made without changing the rendering logic.
    const sopData = {
  "meta": {
    "title": "White Card SOP",
    "subtitle": "Live roadmap – Internal use",
    "version": "Prototype v1.0",
    "notice": "Confidential – Internal Use Only. Do not upload student personal information or ID documents to this prototype.",
    "sourceNote": "Built from the latest uploaded SOP suite: Short Courses Master SOP v1, SOP-SC-01 Enrolment, SOP-SC-02 Processing, SOP-SC-03 Submission.",
    "courseNote": "White Card / CPCWHS1001 is treated as a Type A course. Use the Course Compliance Matrix row for the exact variant before opening a class. Type A requires SafeWork pre-notification, SafeWork post-training lodgment, AVETMISS upload, and certificate/card issue."
  },
  "pages": [
    {
      "id": "home",
      "label": "Main"
    },
    {
      "id": "enrolment",
      "label": "Enrolment"
    },
    {
      "id": "processing",
      "label": "Processing"
    },
    {
      "id": "submission",
      "label": "Submission"
    },
    {
      "id": "documents",
      "label": "Templates / Documents"
    }
  ],
  "phases": [
    {
      "id": "enrolment",
      "title": "Enrolment",
      "owner": "RTO Team / Enrolment Team",
      "phaseNo": "Phase 1",
      "start": "Course request received from operations, sales, or agency.",

    const $ = (selector, root = document) => root.querySelector(selector);
    const $$ = (selector, root = document) => Array.from(root.querySelectorAll(selector));

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function slugify(value) {
      return String(value).toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
    }

    function shortText(value, length = 180) {
      const text = String(value ?? '').replace(/\s+/g, ' ').trim();
      return text.length > length ? text.slice(0, length - 1) + '…' : text;
    }

    function listHtml(items) {
      return `<ul>${items.map(item => `<li>${escapeHtml(item)}</li>`).join('')}</ul>`;
    }

    function tagsHtml(items) {
      return `<div class="doc-tags">${items.map(item => `<span class="tag-pill">${escapeHtml(item)}</span>`).join('')}</div>`;
    }

    function renderApp() {
      $('#appTitle').textContent = sopData.meta.title;

      renderNav();
      renderHome();
      renderPhasePage('enrolment');
      renderPhasePage('processing');
      renderPhasePage('submission');
      renderDocumentsPage();
      buildSearchIndex();
      restoreChecklistState();
      routeFromHash();
    }

    function renderChecklist(phaseId, title, items, type) {
      const keyPrefix = `${phaseId}-${type}`;
      const rows = items.map((item, index) => {
        const id = `check-${keyPrefix}-${index}`;
        return `<li><input type="checkbox" id="${id}" data-check-id="${id}" /><label for="${id}">${escapeHtml(item)}</label></li>`;
      }).join('');
      return `<div class="card checklist-card" id="${keyPrefix}"><h3>${escapeHtml(title)}</h3><ul class="checklist">${rows}</ul></div>`;
    }

    function bindEvents() {
      const printButton = $('#printBtn');
      if (printButton) printButton.addEventListener('click', () => window.print());

      document.addEventListener('click', event => {
        const go = event.target.closest('[data-go]');
        if (go) {
          event.preventDefault();
          navigateTo(go.dataset.go, go.dataset.anchor || null);
          return;
        }

        const focusSearch = event.target.closest('[data-focus-search]');
        if (focusSearch) {
          event.preventDefault();
          $('#globalSearch').focus();
          $('#searchResults').classList.add('open');
          return;
        }

        const reset = event.target.closest('[data-reset-checklists]');
        if (reset) {
          event.preventDefault();
          resetChecklists(reset.dataset.resetChecklists);
          return;
        }

        const clearFilter = event.target.closest('[data-clear-filter]');
        if (clearFilter) {
          const select = $(`#filter-${clearFilter.dataset.clearFilter}`);
          if (select) {
            select.value = 'All owners';
            applyOwnerFilter(clearFilter.dataset.clearFilter, 'All owners');
          }
          return;
        }

        if (event.target.matches('[data-placeholder-link]')) {
          event.preventDefault();
        }
      });

      document.addEventListener('keydown', event => {
        if ((event.key === 'Enter' || event.key === ' ') && event.target.matches('[data-go]')) {
          event.preventDefault();
          navigateTo(event.target.dataset.go, event.target.dataset.anchor || null);
        }
        if (event.key === 'Escape') {
          $('#searchResults').classList.remove('open');
        }
      });

      document.addEventListener('change', event => {
        if (event.target.matches('[data-check-id]')) {
          localStorage.setItem(event.target.dataset.checkId, event.target.checked ? '1' : '0');
        }
        if (event.target.matches('[data-owner-filter]')) {
          applyOwnerFilter(event.target.dataset.ownerFilter, event.target.value);
        }
      });

      $('#globalSearch').addEventListener('input', handleSearchInput);
      $('#globalSearch').addEventListener('focus', () => {
        if ($('#globalSearch').value.trim()) $('#searchResults').classList.add('open');
      });
      $('#clearSearch').addEventListener('click', () => {
        $('#globalSearch').value = '';
        $('#searchResults').classList.remove('open');
        $('#searchResults').innerHTML = '';
        $('#globalSearch').focus();
      });
      window.addEventListener('hashchange', routeFromHash);
    }

    function navigateTo(pageId, anchorId = null) {
      if (!sopData.pages.some(p => p.id === pageId)) pageId = 'home';
      state.currentPage = pageId;
      $$('.page').forEach(page => page.classList.toggle('active', page.id === `page-${pageId}`));
      $$('.nav-button[data-page-button]').forEach(btn => btn.classList.toggle('active', btn.dataset.pageButton === pageId));
      const hash = anchorId ? `#${pageId}/${anchorId}` : `#${pageId}`;
      if (location.hash !== hash) history.pushState(null, '', hash);
      requestAnimationFrame(() => {
        if (anchorId) {
          const target = document.getElementById(anchorId);
          if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        } else {
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }
      });
      $('#searchResults').classList.remove('open');
    }

    function routeFromHash() {
      const raw = location.hash.replace(/^#/, '');
      if (!raw) {
        navigateTo('home');
        return;
      }
      const [pageId, anchorId] = raw.split('/');
      navigateTo(pageId || 'home', anchorId || null);
    }

    function restoreChecklistState() {
      $$('[data-check-id]').forEach(box => {
        box.checked = localStorage.getItem(box.dataset.checkId) === '1';
      });
    }

    function resetChecklists(scope) {
      const boxes = scope === 'all'
        ? $$('[data-check-id]')
        : $$(`#page-${scope} [data-check-id]`);
      boxes.forEach(box => {
        box.checked = false;
        localStorage.removeItem(box.dataset.checkId);
      });
    }

    function applyOwnerFilter(phaseId, owner) {
      const cards = $$(`[data-step-card="${phaseId}"]`);
      const selected = owner.toLowerCase();
      cards.forEach(card => {
        const match = owner === 'All owners' || card.dataset.owner.includes(selected.toLowerCase());
        card.classList.toggle('hidden-by-filter', !match);
      });
    }

    function buildSearchIndex() {
      const index = [];
      index.push({
        page: 'home', anchor: null, type: 'Page', title: 'Main roadmap',
        text: `${sopData.meta.title} ${sopData.meta.subtitle} ${sopData.meta.courseNote} ${sopData.phases.map(p => `${p.title} ${p.owner} ${p.short} ${p.done}`).join(' ')}`
      });

      sopData.phases.forEach(phase => {
        index.push({ page: phase.id, anchor: null, type: 'Phase', title: phase.title, text: `${phase.title} ${phase.owner} ${phase.start} ${phase.done} ${phase.short}` });
      });

      Object.entries(sopData.phasePages).forEach(([phaseId, page]) => {
        index.push({ page: phaseId, anchor: `${phaseId}-entry`, type: 'Checklist', title: page.entryChecklistTitle, text: page.entryChecklist.join(' ') });
        index.push({ page: phaseId, anchor: `${phaseId}-exit`, type: 'Checklist', title: page.exitChecklistTitle, text: page.exitChecklist.join(' ') });
        page.steps.forEach((step, indexNo) => {
          index.push({
            page: phaseId,
            anchor: step.id,
            type: `Step ${indexNo + 1}`,
            title: step.name,
            text: `${step.name} ${step.owner} ${step.timing} ${step.what.join(' ')} ${step.output.join(' ')} ${step.docs.join(' ')}`
          });
        });
      });

      sopData.documents.forEach(group => {
        group.items.forEach(item => {
          index.push({
            page: 'documents',
            anchor: `doc-${slugify(item.name)}`,
            type: group.phase,
            title: item.name,
            text: `${item.name} ${item.purpose} ${group.phase}`
          });
        });
      });

      sopData.escalations.forEach(e => {
        index.push({ page: 'documents', anchor: 'common-escalations', type: 'Escalation', title: e.trigger, text: `${e.phase} ${e.trigger} ${e.level} ${e.owner}` });
      });
      state.searchIndex = index;
    }

    function handleSearchInput(event) {
      const query = event.target.value.trim();
      const results = $('#searchResults');
      if (!query) {
        results.classList.remove('open');
        results.innerHTML = '';
        return;
      }
      const terms = query.toLowerCase().split(/\s+/).filter(Boolean);
      const matches = state.searchIndex
        .map(item => {
          const hay = item.text.toLowerCase();
          const full = hay.includes(query.toLowerCase());
          const count = terms.reduce((acc, term) => acc + (hay.includes(term) ? 1 : 0), 0);
          return { item, score: (full ? 10 : 0) + count };
        })
        .filter(result => result.score > 0 && (terms.length === 1 || result.score >= Math.min(terms.length, 2)))
        .sort((a, b) => b.score - a.score)
        .slice(0, 12)
        .map(result => result.item);

      results.classList.add('open');
      if (matches.length === 0) {
        results.innerHTML = `<div class="empty-state">No result found. Try USI, SafeWork, T-24h, payment, trainer, student list, document pack, AVETMISS, certificate or escalation.</div>`;
        return;
      }
      const qEsc = escapeHtml(query);
      results.innerHTML = matches.map(match => {
        const pageLabel = sopData.pages.find(p => p.id === match.page)?.label || match.page;
        const snippet = highlight(shortText(match.text), query);
        return `
          <div class="search-result">
            <div class="meta">${escapeHtml(pageLabel)} / ${escapeHtml(match.type)}</div>
            <strong>${escapeHtml(match.title)}</strong>
            <p>${snippet}</p>
            <button type="button" class="small-button dark" data-go="${escapeHtml(match.page)}" ${match.anchor ? `data-anchor="${escapeHtml(match.anchor)}"` : ''}>Jump to result</button>
          </div>
        `;
      }).join('');
    }

    function highlight(text, query) {
      let safe = escapeHtml(text);
      const terms = query.trim().split(/\s+/).filter(Boolean).slice(0, 5);
      terms.forEach(term => {
        const escapedTerm = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        if (escapedTerm.length < 2) return;
        safe = safe.replace(new RegExp(`(${escapedTerm})`, 'ig'), '<mark>$1</mark>');
      });
      return safe;
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderApp();
      bindEvents();
    });
  </script>
</body>
</html>
